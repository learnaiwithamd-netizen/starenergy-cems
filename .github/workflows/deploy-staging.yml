name: Deploy — staging

on:
  push:
    branches:
      - main

# Deploys must NOT cancel each other — they queue.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID_STAGING }}
  AZURE_RG: cems-staging-rg
  ACR_NAME: cemsacrstaging
  ACR_REGISTRY: cemsacrstaging.azurecr.io
  CALC_APP_NAME: cems-staging-calc
  API_APP_NAME: cems-staging-api
  KEY_VAULT_NAME: cems-staging-kv-cefcbhmn
  PNPM_VERSION: 9.15.9
  NODE_VERSION: '22'

jobs:
  build-images:
    name: Build & push calc-service image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: set-tag
        run: echo "tag=${GITHUB_SHA}" >>"$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "${ACR_NAME}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push calc-service
        uses: docker/build-push-action@v6
        with:
          context: apps/calc-service
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/calc-service:${{ steps.set-tag.outputs.tag }}
            ${{ env.ACR_REGISTRY }}/calc-service:latest
          cache-from: type=gha,scope=calc-staging
          cache-to: type=gha,scope=calc-staging,mode=max

  migrate:
    name: Prisma migrate deploy
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Read DATABASE_URL from Key Vault
        id: db-secret
        run: |
          DB_URL=$(az keyvault secret show --vault-name "${KEY_VAULT_NAME}" --name database-url --query value -o tsv)
          echo "::add-mask::${DB_URL}"
          echo "db_url=${DB_URL}" >>"$GITHUB_OUTPUT"

      # Resolve any migration that previously failed (e.g. due to GO syntax)
      # so migrate deploy can proceed. Safe to run on every push: exits 0
      # if the named migration is not in a failed state.
      - name: Resolve previously-failed migration (one-time recovery)
        env:
          DATABASE_URL: ${{ steps.db-secret.outputs.db_url }}
        run: |
          pnpm --filter @cems/db exec prisma migrate resolve \
            --rolled-back "20260507000000_add_user_status_and_password_set_tokens" \
            2>/dev/null || true

      # `prisma migrate deploy` is idempotent — running it on every push is
      # cheap (no-ops when no new migrations) and it's the only way to
      # guarantee schema/code parity across squash, rebase, and merge-commit
      # merge styles. The previous `git diff HEAD~1 HEAD -- migrations` gate
      # missed migrations introduced by mid-PR commits on a multi-commit merge.
      - name: Apply Prisma migrations (always; idempotent)
        env:
          DATABASE_URL: ${{ steps.db-secret.outputs.db_url }}
        run: pnpm --filter @cems/db exec prisma migrate deploy

  deploy-spas:
    name: Deploy SPAs to Static Web Apps
    needs: migrate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run build --filter=audit-app --filter=admin-app --filter=client-portal

      - name: Deploy audit-app
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_AUDIT_TOKEN_STAGING }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/audit-app
          output_location: dist
          skip_app_build: true
          production_branch: main

      - name: Deploy admin-app
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_ADMIN_TOKEN_STAGING }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/admin-app
          output_location: dist
          skip_app_build: true
          production_branch: main

      - name: Deploy client-portal
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_CLIENT_TOKEN_STAGING }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/client-portal
          output_location: dist
          skip_app_build: true
          production_branch: main

  deploy-calc:
    name: Activate calc-service revision
    # Wait for migrations so a calc revision can never be activated against
    # an old DB schema. Story 8 will start writing tenant data via the API,
    # which depends on the migration completing first.
    needs: [build-images, migrate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App image (creates new revision)
        run: |
          az containerapp update \
            --name "${CALC_APP_NAME}" \
            --resource-group "${AZURE_RG}" \
            --image "${ACR_REGISTRY}/calc-service:${{ needs.build-images.outputs.image_tag }}" \
            --revision-suffix "${GITHUB_SHA::7}"

      - name: Wait for new revision to be healthy
        run: |
          for _ in $(seq 1 30); do
            STATE=$(az containerapp revision list \
              -n "${CALC_APP_NAME}" -g "${AZURE_RG}" \
              --query "[?contains(name, '${GITHUB_SHA::7}')].properties.healthState | [0]" -o tsv)
            if [[ "${STATE}" == "Healthy" ]]; then
              echo "Calc-service revision is healthy."
              exit 0
            fi
            sleep 5
          done
          echo "::error::calc-service revision did not become healthy within 150s" >&2
          exit 1

  deploy-api:
    # Basic-tier App Service plan (B2) does not support deployment slots.
    # Deploy directly to production. Upgrade to Standard (S1+) to re-enable
    # the slot-swap zero-downtime pattern.
    name: Deploy API (direct to production)
    needs: [migrate, deploy-calc]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        env:
          DATABASE_URL: "sqlserver://placeholder"
        run: |
          pnpm --filter @cems/types build
          pnpm --filter @cems/db build

      - name: Build API
        run: pnpm --filter api build

      - name: Package API for deploy
        env:
          DATABASE_URL: "sqlserver://placeholder"
        run: |
          ARTIFACT=/tmp/api-artifact

          # pnpm's default isolated linker places packages as symlinks into a
          # virtual store. zip -r uses inode-based cycle detection: when two
          # packages share a transitive dep (same real inode), zip stores the
          # content only once — under the FIRST referencing path — and skips
          # all subsequent paths. Those skipped packages produce "Cannot find
          # module" at Node.js startup with zero log output.
          #
          # Hoisted linker creates a flat node_modules with real files (no
          # symlinks), exactly like npm. All modules are accessible from any
          # requiring package and zip works correctly.
          echo "node-linker=hoisted" >> .npmrc

          # Build a self-contained deployment artifact with prod-only deps.
          # workspace:* references are resolved to real versions automatically.
          pnpm deploy --filter api --prod "$ARTIFACT"

          # dist/ is gitignored, so pnpm deploy excludes it; copy explicitly.
          cp -r apps/api/dist "$ARTIFACT/dist"
          cp -r packages/db/dist "$ARTIFACT/node_modules/@cems/db/dist"
          cp -r packages/types/dist "$ARTIFACT/node_modules/@cems/types/dist"

          # With hoisted layout @prisma/client lands at node_modules/@prisma/client.
          # @prisma/client/default.js does require('.prisma/client/default'), which
          # Node.js resolves by walking up to node_modules/.prisma/client/.
          PRISMA_GENERATED=$(find node_modules/.pnpm -path "*/.prisma/client" -type d 2>/dev/null | head -1)
          if [ -z "${PRISMA_GENERATED}" ]; then
            echo "::error::Generated .prisma/client not found in pnpm store — did prisma generate run?" >&2
            exit 1
          fi
          mkdir -p "$ARTIFACT/node_modules/.prisma"
          cp -r "${PRISMA_GENERATED}" "$ARTIFACT/node_modules/.prisma/client"

          cd "$ARTIFACT"
          zip -r "$GITHUB_WORKSPACE/api.zip" .

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy zip to production
        run: |
          az webapp deploy \
            --resource-group "${AZURE_RG}" \
            --name "${API_APP_NAME}" \
            --src-path api.zip \
            --type zip

      - name: Smoke-test production slot
        run: |
          PROD_URL="https://${API_APP_NAME}.azurewebsites.net/api/v1/health"
          for _ in $(seq 1 24); do
            if curl -fsS "${PROD_URL}" >/dev/null 2>&1; then
              echo "API production slot is healthy."
              exit 0
            fi
            sleep 5
          done
          echo "::error::API did not return 200 within 120s after deploy." >&2
          exit 1

  health-check:
    name: Final cross-service smoke
    needs: [deploy-spas, deploy-api, deploy-calc]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe API
        run: curl -fsS "https://${API_APP_NAME}.azurewebsites.net/api/v1/health"

      - name: Probe API db-health
        run: curl -fsS "https://${API_APP_NAME}.azurewebsites.net/api/v1/db-health"

name: Deploy — production

# Manual-trigger only. Never auto-runs on push.
on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA already verified successful on staging'
        required: true
        type: string

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: write   # tag-release job
  id-token: write
  actions: read     # verify-staging queries the Actions API

env:
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID_PROD }}
  AZURE_RG: cems-prod-rg
  ACR_NAME: cemsacrprod
  ACR_REGISTRY: cemsacrprod.azurecr.io
  CALC_APP_NAME: cems-prod-calc
  API_APP_NAME: cems-prod-api
  KEY_VAULT_NAME: cems-prod-kv
  PNPM_VERSION: 9.15.9
  NODE_VERSION: '22'
  TARGET_SHA: ${{ inputs.sha }}

jobs:
  verify-staging:
    name: Verify SHA passed staging
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate SHA shape
        run: |
          if [[ ! "${TARGET_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::inputs.sha must be a 40-char lowercase hex commit SHA. Got: ${TARGET_SHA}"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - name: Confirm deploy-staging.yml succeeded for this SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(gh run list \
            --workflow=deploy-staging.yml \
            --commit "${TARGET_SHA}" \
            --json conclusion \
            --jq '[.[] | select(.conclusion == "success")] | length')
          if [[ "${STATUS}" -lt 1 ]]; then
            echo "::error::No successful deploy-staging run found for SHA ${TARGET_SHA}." >&2
            exit 1
          fi
          echo "Verified: ${STATUS} successful staging run(s) for ${TARGET_SHA}."

  await-approval:
    name: Production gate
    needs: verify-staging
    runs-on: ubuntu-latest
    timeout-minutes: 1440  # up to 24h to receive approval
    environment: production
    steps:
      - run: echo "Production deploy approved for SHA ${TARGET_SHA}."

  build-images:
    name: Build & push calc-service image to prod ACR
    needs: await-approval
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # `environment` here is required so the OIDC token's `sub` claim
    # includes `:environment:production`, matching the prod MI's
    # federated-credential subject. Without this, azure/login fails
    # with `AADSTS70021: No matching federated identity record found`.
    environment: production
    outputs:
      image_tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - id: set-tag
        run: echo "tag=${TARGET_SHA}" >>"$GITHUB_OUTPUT"

      - uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - run: az acr login --name "${ACR_NAME}"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: apps/calc-service
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/calc-service:${{ steps.set-tag.outputs.tag }}
            ${{ env.ACR_REGISTRY }}/calc-service:latest
          cache-from: type=gha,scope=calc-prod
          cache-to: type=gha,scope=calc-prod,mode=max

  migrate:
    name: Prisma migrate deploy (prod)
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - id: db-secret
        run: |
          DB_URL=$(az keyvault secret show --vault-name "${KEY_VAULT_NAME}" --name database-url --query value -o tsv)
          echo "::add-mask::${DB_URL}"
          echo "db_url=${DB_URL}" >>"$GITHUB_OUTPUT"

      # Always run; `prisma migrate deploy` is idempotent. Drops the brittle
      # `HEAD~1 HEAD` skip optimisation that missed migrations on multi-commit
      # promotes and merge-commit merges.
      - name: Apply Prisma migrations
        env:
          DATABASE_URL: ${{ steps.db-secret.outputs.db_url }}
        run: pnpm --filter @cems/db exec prisma migrate deploy

  deploy-spas:
    name: Deploy SPAs to prod SWAs
    needs: migrate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run build --filter=audit-app --filter=admin-app --filter=client-portal

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_AUDIT_TOKEN_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/audit-app
          output_location: dist
          skip_app_build: true
          production_branch: main

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_ADMIN_TOKEN_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/admin-app
          output_location: dist
          skip_app_build: true
          production_branch: main

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_CLIENT_TOKEN_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/client-portal
          output_location: dist
          skip_app_build: true
          production_branch: main

  deploy-calc:
    name: Activate calc-service revision (prod)
    needs: [build-images, migrate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - run: |
          az containerapp update \
            --name "${CALC_APP_NAME}" \
            --resource-group "${AZURE_RG}" \
            --image "${ACR_REGISTRY}/calc-service:${{ needs.build-images.outputs.image_tag }}" \
            --revision-suffix "${TARGET_SHA::7}"

      - run: |
          for _ in $(seq 1 30); do
            STATE=$(az containerapp revision list \
              -n "${CALC_APP_NAME}" -g "${AZURE_RG}" \
              --query "[?contains(name, '${TARGET_SHA::7}')].properties.healthState | [0]" -o tsv)
            if [[ "${STATE}" == "Healthy" ]]; then exit 0; fi
            sleep 5
          done
          echo "::error::calc-service revision did not become healthy within 150s" >&2
          exit 1

  deploy-api:
    name: Deploy API via slot swap (prod)
    needs: [migrate, deploy-calc]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter api build

      - run: |
          cd apps/api
          zip -r ../../api.zip dist node_modules package.json

      - uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - run: |
          az webapp deploy \
            --resource-group "${AZURE_RG}" \
            --name "${API_APP_NAME}" \
            --slot staging \
            --src-path api.zip \
            --type zip

      - run: |
          STAGING_URL="https://${API_APP_NAME}-staging.azurewebsites.net/api/v1/health"
          for _ in $(seq 1 18); do
            if curl -fsS "${STAGING_URL}" >/dev/null 2>&1; then exit 0; fi
            sleep 5
          done
          echo "::error::API staging slot did not return 200 within 90s. Aborting swap." >&2
          exit 1

      - run: |
          az webapp deployment slot swap \
            --resource-group "${AZURE_RG}" \
            --name "${API_APP_NAME}" \
            --slot staging \
            --target-slot production

      - id: smoke
        continue-on-error: true
        run: |
          PROD_URL="https://${API_APP_NAME}.azurewebsites.net/api/v1/health"
          for _ in $(seq 1 12); do
            if curl -fsS "${PROD_URL}" >/dev/null 2>&1; then exit 0; fi
            sleep 5
          done
          exit 1

      - if: steps.smoke.outcome == 'failure'
        run: |
          echo "::warning::Production slot health check failed. Swapping back."
          az webapp deployment slot swap \
            --resource-group "${AZURE_RG}" \
            --name "${API_APP_NAME}" \
            --slot production \
            --target-slot staging
          exit 1

  tag-release:
    name: Tag release
    needs: [deploy-spas, deploy-api, deploy-calc]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 0

      - name: Create tag + GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="release/${TARGET_SHA}"
          # Idempotent: a re-deploy of the same SHA must not fail just because the
          # tag/release already exists. Skip both if they're already there.
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists locally — skipping create."
          elif git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag ${TAG} already exists on origin — skipping create."
          else
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists — skipping create."
          else
            gh release create "${TAG}" \
              --title "Production release ${TARGET_SHA::7}" \
              --notes "Promoted SHA ${TARGET_SHA} from staging to production." \
              --target "${TARGET_SHA}"
          fi
